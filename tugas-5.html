<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online</title>

    <!-- link bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ini style csss -->
    <style>
            body {
                background: #f4f6f9;
            }
            .card {
                border-radius: 15px;
            }
            .btn-custom {
                border-radius: 10px;
            }
            .table tbody tr:hover {
                background-color: #f1f1f1;
            }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h3 class="text-center mb-4">🛒 Manajemen Produk </h3>

        <div id="notifikasi"></div>

        <!-- form -->
        <div class="row g-2 mb-3">
            <div class="col-md-5">
                <input type="text" id="nama" class="form-control" placeholder="Nama Produk">
            </div>
            <div class="col-md-4">
                <input type="number" id="harga" class="form-control" placeholder="Harga">
            </div>
            <div class="col-md-3">
                <button id="tambah" class="btn btn-primary w-100 btn-custom">Tambah</button>
            </div>
        </div>

        <!-- hasil table -->
        <h5 class="mb-3">📦 Daftar Produk</h5>

        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="listProduk"></tbody>
        </table>

    </div>

    </div>

    <!-- java script -->

    <script>
        // Data produk
        let produk = [
        { id: 1, nama: "Laptop", harga: 70000000 },
        {id: 2, nama: "Mouse", harga: 150000 },
        {id: 3, nama: "keyboard", harga: 300000 },
        {id: 4, nama: "'Monitor", harga: 200000 },
        {id: 5, nama: "Printer", harga: 120000 }
        ];

        const listProduk = document.getElementById("listProduk");
        const btnTambah = document.getElementById("tambah");
        const notifikasi = document.getElementById("notifikasi");

        // tampilkam produk
        function tampilkanProduk(){
            listProduk.innerHTML = "";

            produk.forEach(({id, nama, harga }, index) => {
                const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${nama}</td>
                    <td>Rp ${harga.toLocaleString()}</td>
                    <td>
                        <button class= "btn btn-danger btn-sm" onclick="hapusProduk(${id})">Hapus</button>
                    </td>
                </tr> `;
                listProduk.innerHTML += row;

            });
        }
        
        // fungsi notifikasi
        function showAlert(pesan) {
            notifikasi.innerHTML = `
            <div class="alert alert-success alert-dismissible fade show" role="alert">
            ${pesan}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div> `;

        // hilang otomatis
        setTimeout(() => {
            notifikasi.innerHTML = "";
        }, 20000);
        }

        // tambah produk
        btnTambah.addEventListener("click", () => {
            const nama = document.getElementById("nama").value;
            const harga = document.getElementById("harga").value;

            if (nama === "" || harga === "") {
                alert("Isi data produk!");
                return;
            }

            const produkBaru = {
                id: produk.length + 1, 
                nama,
                harga: Number(harga)
            };

            produk = [...produk, produkBaru];
            tampilkanProduk();

            // notifikasi jika produk ditambahkan
            showAlert("Produk berhasil ditambahkan");

            //reset input 
            document.getElementById("nama").value = "";
            document.getElementById("harga").value = "";

        });

        // hapus produk
            function hapusProduk(id) {
                produk = produk.filter(p => p.id !== id);
                tampilkanProduk();
            }


        // tampilan awal 
        tampilkanProduk();
        
    </script>
</body>
</html>
